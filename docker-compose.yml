version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alba_auth
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://admin:admin123@postgres:5432/mydatabase
      - JWT_SECRET=change_this_secret
      - SMTP_HOST=
      - SMTP_PORT=
      - SMTP_USER=
      - SMTP_PASS=
      - APP_URL=http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
